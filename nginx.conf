# Nginx конфигурация для request_bot на Timeweb VDS.
# Этот файл описывает только виртуальные хосты request_bot и ожидает,
# что nginx уже подключен к общему Docker network `sites_shared`.
# Upstream aliases:
# - request-bot-api:8000
# - request-bot-bot:8080

server {
    listen 80;
    server_name bot-api.24beershop.ru app.24beershop.ru admin.24beershop.ru;
    return 301 https://$host$request_uri;
}

# FastAPI backend + Telegram webhook
server {
    listen 443 ssl http2;
    server_name bot-api.24beershop.ru;

    ssl_certificate     /etc/letsencrypt/live/app.24beershop.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.24beershop.ru/privkey.pem;

    client_max_body_size 20M;

    location /webhook/ {
        proxy_pass http://request-bot-bot:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://request-bot-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://request-bot-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# Веб-админка (статика React)
server {
    listen 443 ssl http2;
    server_name admin.24beershop.ru;

    ssl_certificate     /etc/letsencrypt/live/admin.24beershop.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.24beershop.ru/privkey.pem;

    root /opt/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Mini App (статика React)
server {
    listen 443 ssl http2;
    server_name app.24beershop.ru;

    ssl_certificate     /etc/letsencrypt/live/app.24beershop.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.24beershop.ru/privkey.pem;

    root /opt/miniapp/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
