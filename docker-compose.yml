name: request_bot

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: requestbot
      POSTGRES_USER: requestbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requestbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    # При первом запуске загрузите модель:
    # docker exec -it requestbot-ollama-1 ollama pull llama3

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://requestbot:${POSTGRES_PASSWORD}@postgres:5432/requestbot
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    expose:
      - "${BOT_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m bot.main
    networks:
      default:
      shared_edge:
        aliases:
          - request-bot-bot

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://requestbot:${POSTGRES_PASSWORD}@postgres:5432/requestbot
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    expose:
      - "8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      default:
      shared_edge:
        aliases:
          - request-bot-api

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  shared_edge:
    external: true
    name: sites_shared
